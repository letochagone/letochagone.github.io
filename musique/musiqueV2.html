let vPiano = function(i,forme) {
  let k0=forme.k1;
  let k1=forme.k2;
  let k2=forme.k3;
  let k3=forme.k4;
  let m=forme.m;
  let p=forme.p;

  let b0=0.005;
  let b1=0.005;
  let b3=0.002;

  let ya= i<=k0 ?
      -m * 1/(1-Math.exp(-b0*k0)) * (Math.exp(-b0*i)-1)
    : 0;

  let yb= i>k0 && i<=(k0+k1)           ?
    m + (m-p) * ( Math.exp(-b1*i)-Math.exp(-b1*k0)) / (Math.exp(-b1*k0)*(1-Math.exp(-b1*k1)))
    : 0;

  let yc= i>(k0+k1)  &&  i<=(k0+k1+k2) ?
    p 
    : 0;

  let yd = i>(k0+k1+k2) && i<=(k0+k1+k2+k3) ?
    p + p * 
         ( Math.exp(-b3*i)-Math.exp(-b3*(k0+k1+k2))) / 
        (Math.exp(-b3*(k0+k1+k2))* (1-Math.exp(-b3*k3)) )

   :0;

  return ya + yb + yc + yd;


}
let v = function(i,forme) {

    let ya= i<=k1                        ? m/k1*i            : 0;

    let yb= i>k1 && i<=(k1+k2)           ? (p-m)/k2*(i-k1)+m : 0;

    let yc= i>(k1+k2)  &&  i<=(k1+k2+k3) ? p : 0;

    let yd = i>(k1+k2+k3) && i<=(k1+k2+k3+k4) ?p-p/k4*(i-k1-k2-k3):0;

    return ya + yb + yc + yd;
}

let vExp = function(i,forme) {
    /*
      cette function retourne une forme entre i =0 et i=40
    */
    let k1=forme.k1;
    let k2=forme.k2;
    let k3=forme.k3;
    let k4=forme.k4;
    let m=forme.m;
    let p=forme.p;
    let a1= 0.3;
    let a2=  m / (1-Math.exp(-a1*k1));
    let reA=(1-Math.exp(-a1*i))*a2;
    let C=0.14;
    let B=(m-p)/(Math.exp(-C*k1) - Math.exp(-C*(k1+k2)));
    let A= m - B * Math.exp(-C*k1);
    let reB = A + B * Math.exp(-C * i);
    let reC = p;
    let l=7;
    let reD= -1/k4 * p * (i - (k1+k2+k3+k4))* Math.exp(-1/l * (i-(k1+k2+k3)) );

    let ya= i<=k1                        ? reA         : 0;
    let yb= i>k1 && i<=(k1+k2)           ? reB         : 0;
    let yc= i>(k1+k2)  &&  i<=(k1+k2+k3) ? reC         : 0;
    let yd = i>(k1+k2+k3) && i<=(k1+k2+k3+k4) ? reD    :0;

    return ya + yb + yc + yd;
}

  let b = Math.round(p2*SamplesPerSec);

}



let periodSaw= function(i,delta) {
  let frequence=440;
  let periode= Math.round(SamplesPerSec/frequence);
  //on va séparer periode en a+b+a
  let p2a = Math.floor(periode * delta);
  //si p2a est impaire on lui ajoute 1
  // 
  if (p2a%2) p2a++;
  let b=periode-p2a;
  let a=p2a/2;

  let i0 = i%(2*a+b);
  let y1 = (    i0<=a                       )? 1 / a * i0                    : 0;
  let y2 = (    a<=i0 && i0<=(a+b)          )? (-2 / b) * i0 + 1 + 2 * a / b : 0;
  let y3 = (   (a+b)<=i0 && i0<=(a+b+a)     )? 1 / a * i0 - 1 - (a + b) / a  : 0;
  
  let resultat = y1+y2+y3;
  return resultat;
}
